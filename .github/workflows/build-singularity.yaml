name: Build and Push Singularity Container

on:
  workflow_run:
    workflows:
      - Build and Push Docker Image
    types:
      - completed
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Base Docker image tag in GHCR to convert (for example: sha-<commit> or latest); workflow appends compute suffixes"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compute:
          - cuda_arch: "7.0"
            sm_tag: sm70
          - cuda_arch: "7.5"
            sm_tag: sm75
          - cuda_arch: "8.0"
            sm_tag: sm80
          - cuda_arch: "8.6"
            sm_tag: sm86
          - cuda_arch: "8.9"
            sm_tag: sm89
          - cuda_arch: "9.0"
            sm_tag: sm90
          - cuda_arch: "10.0"
            sm_tag: sm100

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Apptainer
        run: |
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Resolve image references
        id: refs
        uses: actions/github-script@v7
        env:
          DOCKER_TAG_INPUT: ${{ github.event.inputs.docker_tag }}
          REF_NAME: ${{ github.ref_name }}
          MATRIX_SM_TAG: ${{ matrix.compute.sm_tag }}
        with:
          script: |
            const crypto = require('crypto');
            const workflowInputTag = (process.env.DOCKER_TAG_INPUT ?? '').trim();
            const matrixSmTag = (process.env.MATRIX_SM_TAG ?? '').trim();
            const defaultBranch = context.payload.repository.default_branch;
            const owner = context.repo.owner.toLowerCase();
            const repo = context.repo.repo.toLowerCase();
            const sourceBranch = context.eventName === 'workflow_run'
              ? context.payload.workflow_run.head_branch
              : process.env.REF_NAME;
            const baseImageTag = context.eventName === 'workflow_run'
              ? `sha-${context.payload.workflow_run.head_sha}`
              : workflowInputTag;
            const imageTag = `${baseImageTag}-${matrixSmTag}`;

            if (!baseImageTag || !matrixSmTag) {
              const observedValue = workflowInputTag || context.payload.workflow_run?.head_sha || matrixSmTag || 'none';
              core.setFailed(`Unable to determine Docker image tag from ${context.eventName} event. Received: ${observedValue}`);
              return;
            }

            const tagDigest = crypto.createHash('sha256').update(imageTag).digest('hex').slice(0, 12);
            const sifFile = `${repo}-${tagDigest}.sif`;

            core.setOutput('docker_image', `ghcr.io/${owner}/${repo}:${imageTag}`);
            core.setOutput('singularity_image_repo', `ghcr.io/${owner}/${repo}-singularity`);
            core.setOutput('singularity_sha_tag', imageTag);
            core.setOutput('singularity_sm_tag', matrixSmTag);
            core.setOutput('singularity_latest_sm_tag', `latest-${matrixSmTag}`);
            core.setOutput('push_latest', sourceBranch === defaultBranch ? 'true' : 'false');
            core.setOutput('sif_file', sifFile);

      - name: Pull Docker image from GHCR and convert to SIF
        run: |
          apptainer pull "${{ steps.refs.outputs.sif_file }}" "docker://${{ steps.refs.outputs.docker_image }}"

      - name: Push Singularity image artifact to GHCR
        run: |
          set -euo pipefail

          apptainer push \
            "${{ steps.refs.outputs.sif_file }}" \
            "oras://${{ steps.refs.outputs.singularity_image_repo }}:${{ steps.refs.outputs.singularity_sha_tag }}"

          if [[ "${{ steps.refs.outputs.push_latest }}" == "true" ]]; then
            apptainer push \
              "${{ steps.refs.outputs.sif_file }}" \
              "oras://${{ steps.refs.outputs.singularity_image_repo }}:${{ steps.refs.outputs.singularity_sm_tag }}"

            apptainer push \
              "${{ steps.refs.outputs.sif_file }}" \
              "oras://${{ steps.refs.outputs.singularity_image_repo }}:${{ steps.refs.outputs.singularity_latest_sm_tag }}"
          fi
