name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 7
      matrix:
        compute:
          - cuda_arch: "7.0"
            sm_tag: sm70
          - cuda_arch: "7.5"
            sm_tag: sm75
          - cuda_arch: "8.0"
            sm_tag: sm80
          - cuda_arch: "8.6"
            sm_tag: sm86
          - cuda_arch: "8.9"
            sm_tag: sm89
          - cuda_arch: "9.0"
            sm_tag: sm90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add this step to free up disk space
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ matrix.compute.sm_tag }},enable={{is_default_branch}}
            type=raw,value=latest-${{ matrix.compute.sm_tag }},enable={{is_default_branch}}
            type=sha,prefix=sha-,suffix=-${{ matrix.compute.sm_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            TORCH_CUDA_ARCH_LIST=${{ matrix.compute.cuda_arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
